on: [push, pull_request]

name: R-CMD-check

jobs:
  R-CMD-check:
    runs-on: macOS-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Install macOS system dependencies
        if: runner.os == 'macOS'
        run: |
          brew install imagemagick@6
          brew install libgit2
          curl -O https://mac.r-project.org/tools/gfortran-12.0.1-20220312-is-darwin20-arm64.tar.xz
          sudo tar fxz gfortran-12.0.1-20220312-is-darwin20-arm64.tar.xz -C /
          export PATH=$PATH:/opt/R/arm64/gfortran/bin
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 4.2.3
      - name: Install dependencies manually
        run: |
          # 1. Install core setup tools
          install.packages(c("remotes", "rcmdcheck", "BiocManager"), repos = "https://cloud.r-project.org")

          # 2. Tell remotes it is allowed to look at Bioconductor repositories
          options(repos = BiocManager::repositories())

          # 3. Explicitly install the foundational Bioconductor dependencies needed by GMMAT
          BiocManager::install(c("SeqArray", "SeqVarTools"), ask = FALSE, update = FALSE)

          # 4. Explicitly pull GMMAT from CRAN and GENESIS from Bioconductor
          remotes::install_cran(c("rcmdcheck", "GMMAT"))
          BiocManager::install("GENESIS", ask = FALSE, update = FALSE)

          # 5. Clean up any remaining dependencies listed in your DESCRIPTION file
          remotes::install_deps(dependencies = TRUE)
        shell: Rscript {0}

      - name: Check
        run: rcmdcheck::rcmdcheck(args = "--no-manual", error_on = "error")
        shell: Rscript {0}
